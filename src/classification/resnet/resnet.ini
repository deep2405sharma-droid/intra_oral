[TRAINING]
num_classes      = 3
# 3 classes: normal, opmd, variation
epochs           = 20
batch_size       = 16
# Pretrained backbone uses lower LR — same rationale as U-Net encoder_lr
backbone_lr      = 0.00005
# Freshly initialised FC head uses higher LR
head_lr          = 0.0005
momentum         = 0.9
weight_decay     = 0.0005
gradient_clip    = 1.0
val_split        = 0.15
test_split       = 0.15
# LR scheduler: cosine | step | plateau
lr_scheduler     = cosine
min_lr           = 0.000001
lr_patience      = 5
lr_factor        = 0.5
num_workers      = 2
log_every        = 10
val_every        = 1
# Minimum confidence to count a prediction as valid
score_threshold  = 0.50

[SAMPLER]
# Oversample minority classes (opmd, variation) in training batches
weighted_sampler    = True
oversample_minority = True

[MODEL]
backbone    = resnet50
# Any torchvision ResNet: resnet18 | resnet34 | resnet50 | resnet101
pretrained  = True
# True → load ImageNet weights; backbone fine-tuned with backbone_lr
dropout     = 0.3
# Dropout before the FC head to reduce overfitting
input_size  = 224,224
# Standard ImageNet input size for ResNet

[SYSTEM]
device      = cuda
seed        = 42

[LOGGING]
save_best_model  = True
save_every_epoch = False

[PATHS]
model_dir           = /kaggle/working/intraoral_lesion/outputs/resnet/models
output_dir          = /kaggle/working/intraoral_lesion/outputs/resnet/training
infer_output_dir    = /kaggle/working/intraoral_lesion/outputs/resnet/inference
checkpoint_dir      = /kaggle/working/intraoral_lesion/outputs/resnet/checkpoint
log_file            = /kaggle/working/intra_oral/logs/intraoral_lesion.log

[DATASET]
val_split      = 0.20
random_seed    = 42
# Which dataset provides Normal class images
# Options: SMART_II | SMART_OM | BOTH
normal_dataset = BOTH

[VISUAL]
visualize_predictions = False
# Set True to save confusion matrix + per-class sample predictions

[STAGES]
# Comma-separated pipeline stages to run
# train    : train ResNet classifier
# evaluate : evaluate on val set, save metrics + confusion matrix
# inference: run on new images
stages = train,evaluate,inference

