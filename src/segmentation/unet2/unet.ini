[TRAINING]
num_classes      = 1
# 1 = background + foreground (binary lesion segmentation).
# Increase for multi-class (e.g. 8 = bg + 7 oral regions).
epochs           = 10
batch_size       = 2
encoder_lr       = 0.0001
# Lower LR for the pretrained encoder — same backbone_lr / head_lr rationale
# as Mask R-CNN fine-tuning.
decoder_lr       = 0.001
# Higher LR for the randomly-initialised SMP decoder blocks.
momentum         = 0.9
weight_decay     = 0.0005
gradient_clip    = 1.0
val_split        = 0.15
test_split       = 0.15
# Loss function: bce | dice | bce_dice | focal_dice
loss_function    = bce_tversky
# Weight of BCE term in combined losses  (dice weight = 1 - bce_weight)
bce_weight       = 0.5
# LR scheduler: cosine | step | plateau
lr_scheduler     = cosine
min_lr           = 0.000025
lr_patience      = 5
lr_factor        = 0.5
num_workers      = 2
# Sigmoid output above this threshold is classified as foreground
mask_threshold   = 0.50
score_threshold  = 0.50
# Penalize FP
alpha = 0.4
# Penalize FN
beta = 0.6
focal_gamma = 2.0
focal_alpha = 0.25
log_every        = 10
val_every        = 2

[SAMPLER]
weighted_sampler    = True
oversample_minority = False

[MODEL]
backbone = resnet34
# Any SMP encoder key: resnet34 | resnet50 | resnet101 | efficientnet-b4 | mobilenet_v2
# Changing this one value swaps the entire encoder; SMP handles channel widths internally.
pretrained = True
# True → load ImageNet weights via SMP encoder registry.
decoder_channels = 256,128,64,32,16
# Output channels per decoder block, coarsest → finest.
#
# decoder_channels controls the OUTPUT width of each decoder block AFTER the
# skip-connection concat+conv.  You choose these values freely — SMP manages
# the concat with encoder skip channels internally.
#
# The ONE hard constraint: len(decoder_channels) must equal the number of
# encoder skip-connection levels for the chosen backbone:
#
#   backbone          skip levels   decoder_channels (example)
#   ──────────────────────────────────────────────────────────
#   resnet34               5        256,128,64,32,16
#   resnet50               5        256,128,64,32,16
#   resnet101              5        256,128,64,32,16
#   mobilenet_v2           5        256,128,64,32,16
#   efficientnet-b0        6        256,128,64,32,16,8
#   efficientnet-b4        6        256,128,64,32,16,8
#
# unetconfig.py validates this at startup and raises a clear ValueError if
# the count is wrong — rather than letting SMP throw a cryptic shape mismatch
# error mid-training.
bilinear_upsample = False
# False → learned ConvTranspose2d upsampling (default SMP UNet).

[SYSTEM]
device      = cuda
seed        = 42

[LOGGING]
save_best_model  = True
save_every_epoch = False

[PATHS]
# Masks are derived from coco_file JSON polygons — no separate masks_dir needed.
# Uses the same CSV + coco_file column as Mask R-CNN training.
images_dir       = ./data/images
coco_dir         = ./data/coco
csv_path         = ./data/smart_merged.csv
model_dir        = /kaggle/working/intraoral_lesion/outputs/unet/models
output_dir       = /kaggle/working/intraoral_lesion/outputs/unet/unet_training
infer_output_dir = /kaggle/working/intraoral_lesion/outputs/unet/inference_output
checkpoint_dir   = /kaggle/working/intraoral_lesion/outputs/unet/checkpoint
zeroshot_output_dir = /kaggle/working/intraoral_lesion/outputs/unet/zeroshot
# Optional: a previously-trained checkpoint attached as a read-only Kaggle
# input dataset, used to resume on a fresh session before any local
# checkpoint exists. Leave blank / comment out if you don't have one yet.
# pretrained_checkpoint = /kaggle/input/datasets/v18hub/intraoral-unet-checkpoints/best.pth

[DATASET]
val_split    = 0.20
random_seed  = 42
# Skip annotations whose rasterised pixel count < min_area (artefact filter)
# Mirrors DATASET.min_area used in maskrcnn.ini
min_area     = 10000
normal_dataset = BOTH
# Options: SMART_II | SMART_OM | BOTH

[VISUAL]
visualize_predictions = False

[STAGES]
stages = prepare,train,evaluate,inference