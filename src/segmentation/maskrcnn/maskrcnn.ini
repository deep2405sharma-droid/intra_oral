[TRAINING]
num_classes = 7
epochs = 10
batch_size = 4
backbone_lr = 0.0001
head_lr = 0.001
momentum = 0.9
weight_decay = 0.0005
gradient_clip = 1.0

val_split = 0.15
test_split = 0.15

# Detectron2 model zoo config key
pretrained_weights = COCO-InstanceSegmentation/mask_rcnn_R_50_FPN_3x.yaml
num_workers        = 2
# images_per_batch   = 2
min_lr            = 0.00025
max_iter           = 300
# batch_per_image    = 128
# Minimum confidence score to keep a detection
score_threshold    = 0.50
mask_threshold = 0.30
# Save checkpoint every N iterations
# checkpoint_period  = 500
log_every = 10
val_every = 2

[SAMPLER]
weighted_sampler = True
oversample_minority = False

[MODEL]
backbone = resnet50_fpn
pretrained = True

[SYSTEM]
device = cpu
num_workers = 4
seed = 42

[LOGGING]
save_best_model = True
save_every_epoch = True

[PATHS]
model_dir         = /kaggle/working/intraoral_lesion/outputs/mask_rcnn/models
roi_output_dir    = /kaggle/working/intraoral_lesion/outputs/mask_rcnn/roi_crops
infer_output_dir  = /kaggle/working/intraoral_lesion/outputs/mask_rcnn/inference_output
output_dir = /kaggle/working/intraoral_lesion/outputs/mask_rcnn/maskrcnn_training
zeroshot_output_dir = /kaggle/working/intraoral_lesion/outputs/mask_rcnn/zeroshot
checkpoint_dir = /kaggle/working/intraoral_lesion/outputs/mask_rcnn/checkpoint

[DATASET]
val_split         = 0.2
random_seed       = 42
# Ignore polygons smaller than this area (pixels²) — filters out artefacts
min_area          = 10000
normal_dataset = SMART_II
# other options SMART_OM or BOTH

[ROI]
# Output size for ResNet-50 input
roi_size           = 224
# Background fill outside mask polygon: black | mean | blur
roi_background     = black
# Save a side-by-side overlay for visual verification
save_mask_overlay  = true
# Minimum score to use a detection as ROI source
score_min_roi      = 0.60

[VISUAL]
visualize_coco = False

[STAGES]
stages=prepare,zero_shot,train,evaluate,inference