[TRAINING]
# Number of output classes: background + normal + opmd + variation
num_classes         = 4
epochs              = 5
batch_size          = 4
# Encoder (pretrained ResNet34) uses lower LR — fine-tuning only
encoder_lr          = 0.0001
# Decoder (freshly initialised) uses higher LR — learning from scratch
decoder_lr          = 0.001
momentum            = 0.9
weight_decay        = 0.0005
# Clip gradients to prevent exploding gradients
gradient_clip       = 1.0

val_split           = 0.15
test_split          = 0.15

# Minimum LR for CosineAnnealingLR scheduler
min_lr              = 0.00001
# Log loss every N batches
log_every           = 10
# Run validation every N epochs
val_every           = 2

# Combined loss: Dice + BCE
# Dice loss handles class imbalance (lesion = small % of pixels)
# BCE loss provides stable gradient signal
loss                = dice_bce
# Weight given to lesion classes vs background in BCE component
class_weights       = 1.0,3.0,5.0,4.0
# background=1.0, normal=3.0, opmd=5.0(most rare), variation=4.0


[SAMPLER]
# Use weighted sampler to oversample opmd/variation images
weighted_sampler    = True
oversample_minority = True


[MODEL]
# Encoder backbone — pretrained on ImageNet for transfer learning
# Options: resnet34, resnet50, efficientnet-b0, mobilenet_v2
encoder             = resnet34
pretrained          = True
# Input image size (H x W) — resized before feeding into U-Net
input_size          = 512,512
# Decoder channels at each upsampling stage
decoder_channels    = 256,128,64,32,16
# Dropout rate in decoder to reduce overfitting
dropout             = 0.3


[SYSTEM]
device              = cpu
num_workers         = 4
seed                = 42


[LOGGING]
save_best_model     = True
save_every_epoch    = True

[PATHS]
model_dir           = /kaggle/working/intraoral_lesion/outputs/unet/models
mask_output_dir     = /kaggle/working/intraoral_lesion/outputs/unet/predicted_masks
overlay_output_dir  = /kaggle/working/intraoral_lesion/outputs/unet/overlays
output_dir          = /kaggle/working/intraoral_lesion/outputs/unet/training
checkpoint_dir      = /kaggle/working/intraoral_lesion/outputs/unet/checkpoint


[DATASET]
val_split           = 0.2
random_seed         = 42
min_area            = 500
normal_dataset      = SMART_II
train_csv           = C:\Users\ASUS\OneDrive\Desktop\intra_oral_ml\data\masks\combined_with_masks.csv


[MASK]
# Binary mask PNG generation settings
# Pixel value assigned to each class in the mask PNG
# 0 = background, 1 = normal, 2 = opmd, 3 = variation
mask_background     = 0
mask_normal         = 1
mask_opmd           = 2
mask_variation      = 3
# Mask image size matches input_size above
mask_size           = 512,512
# Save side-by-side overlay for visual verification
save_mask_overlay   = true


[EVALUATION]
# Metrics to compute after each validation epoch
# Dice: directly measures mask overlap (preferred for segmentation)
# IoU: stricter overlap metric
# pixel_acc: overall pixel-wise accuracy (misleading with class imbalance)
metrics             = dice,iou,pixel_acc
# Minimum score/confidence to count a pixel as foreground
score_threshold     = 0.50
# IoU threshold for counting a prediction as correct (per lesion)
iou_threshold       = 0.50


[VISUAL]
# Set True to visualize mask overlays during training
visualize_masks     = False


[STAGES]
# Comma-separated list of pipeline stages to run
# prepare    : build pixel mask PNGs from VIA/COCO JSON
# train      : train U-Net
# evaluate   : evaluate on test set
# inference  : run on new images
stages              = prepare,train,evaluate,inference

[LOGGER]
logger.filename = log_config.ini

[DATA]
merged.csv = /kaggle/input/datasets/v18hub/intraoral-lesion/smart_merged/smart_merged/patient_metadata/smart_merged.csv
aug.smart.csv = /kaggle/input/datasets/v18hub/intraoral-lesion/SMART_II_AUGMENT/SMART_II_AUGMENT/augment_smart_patient_metadata.csv
aug.smartom.csv = /kaggle/input/datasets/v18hub/intraoral-lesion/SMART_OM_AUGMENT/SMART_OM_AUGMENT/augment_smartom_patient_metadata.csv

[SEGMENT-UNET]
unet.config = C:\Users\ASUS\OneDrive\Desktop\intra_oral_ml\src\segmentation\unet\unet.ini
train.dataset = C:\Users\ASUS\OneDrive\Desktop\intra_oral_ml\data\masks\train_dataset.csv