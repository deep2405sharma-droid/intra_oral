[loggers]
keys=root

[handlers]
keys=customSizeDayRotatingFileHandler

[formatters]
keys=standard

[logger_root]
level=DEBUG
handlers=customSizeDayRotatingFileHandler

[handler_customSizeDayRotatingFileHandler]
class=utils.log_handler.CustomSizeDayRotatingFileHandler
level=DEBUG
formatter=standard
args=('/logs/intraoral_lesion.log', 'midnight', 5, 4)

[formatter_standard]
format=%(asctime)s - %(name)s - %(levelname)s - %(transaction_id)s - %(message)s
datefmt=%Y-%m-%d %H:%M:%S
